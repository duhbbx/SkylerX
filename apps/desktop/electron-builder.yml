appId: com.skylerx.desktop
productName: SkylerX
directories:
  output: release
  buildResources: build
files:
  - out
  - package.json
  - '!**/*.{map,ts,tsx}'
# 原生模块（better-sqlite3 等）需经 install-app-deps / electron-rebuild 按 ABI 重编，
# 且 .node 不能进 asar，必须解包。
asarUnpack:
  - '**/*.node'

# ── Windows：x64 + arm64 双架构 NSIS 安装包 ──
# arm64 走交叉编译（GH-hosted 暂无 Windows ARM runner），native modules 用上游 arm64 prebuild。
#
# 签名走 SignPath.io（OSS 免费）：electron-builder 本身不直接签，而是产出未签 .exe，
# 由 CI 后续 step 上传 SignPath → 拉回签好的 .exe 覆盖。详见 .github/workflows/build-desktop.yml。
# 这里只设元数据（publisherName 影响 UAC 弹框上的名字 + NSIS 显示）。
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    # portable = 单一 .exe 免安装,双击即运行,不写注册表/开始菜单,
    # 适合"放 U 盘就能用"的场景 + 公司网管禁止运行安装程序的环境。
    # 安装包仍是 nsis 主流方案;portable 只是额外多产一份。
    - target: portable
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  publisherName: Wuhan Skyler Network Technology Co., Ltd.

# portable 的产物名走单独命名,跟 setup 区分开
portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}

# ── macOS：x64 + arm64 分两份 dmg ──
# 不用 universal：x64 用户装 universal 多吃一倍体积。两份 dmg 各自下载更省。
#
# 签名 / 公证策略：
#   - hardenedRuntime + entitlements 始终开（不签时也无害；签时 Apple 强制要求）
#   - identity: null 是「无 CSC_LINK 时跳过签名」的兜底；CI 在 secret 齐时用 -c.mac.identity= 覆盖
#   - notarize 由 CI 在 5 个 APPLE_* secret 齐全时用 -c.mac.notarize.teamId= 打开
# 这样未配 secret 的本地 / 分支构建照常出 dmg（未签），配齐 secret 自动签 + 公证。
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: null
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── Linux：x64 全套 + arm64 仅 AppImage / tar.gz ──
# AppImage 通用、deb（Ubuntu / Debian / Deepin / 统信 UOS / 优麒麟）、
# rpm（Fedora / openEuler / 红旗 / 银河麒麟 RHEL 系）、
# pacman（Arch / Manjaro）、tar.gz（内网装机 / 企业批量部署解压即用）
# NOTE: electron-builder 25 给 arm64 拉的 fpm 是 x86 二进制（upstream fpm 没发 arm64 release），
# 在 arm64 runner 上跑直接 ENOEXEC。所以 arm64 只留 AppImage + tar.gz（这俩不走 fpm）。
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: pacman
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
        - arm64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

# ── deb / rpm 必须放顶层（不能嵌在 linux: 下，electron-builder 25.x 会 ValidationError）──
# deb 兼容：Ubuntu 24.04 起部分包名加 t64 后缀（time_t 64-bit 迁移）；
# `pkg | pkg-t64` 写法表示「任一可满足」，覆盖 Ubuntu 20.04-24.04 + 麒麟 + 统信。
# libsecret 是 Electron safeStorage 必需（密码加密落盘）。
deb:
  depends:
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
    - libsecret-1-0
    - libappindicator3-1 | libayatana-appindicator3-1
rpm:
  depends:
    - libnotify
    - libXScrnSaver
    - libXtst
    - libsecret

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# 自动更新发布渠道：GitHub Releases。
# CI 打 tag 发布 release 时，electron-builder 会生成 latest*.yml 供 electron-updater 检查。
publish:
  provider: github
  owner: duhbbx
  repo: SkylerX
