name: build-desktop

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS：Intel 用 macos-13、Apple Silicon 用 macos-latest（M-series）──
          # 都是 native build，原生模块直接重编不需要交叉。
          - { name: mac-x64,    os: macos-13,         eb_args: '--mac --x64',    npm_arch: x64    }
          - { name: mac-arm64,  os: macos-latest,     eb_args: '--mac --arm64',  npm_arch: arm64  }

          # ── Windows：x64 native；arm64 在 x64 runner 上交叉打包 ──
          # GH-hosted 暂无 Windows ARM runner，arm64 native modules 走 prebuild。
          - { name: win-x64,    os: windows-latest,   eb_args: '--win --x64',    npm_arch: x64    }
          - { name: win-arm64,  os: windows-latest,   eb_args: '--win --arm64',  npm_arch: arm64  }

          # ── Linux：x64 + arm64 双架构 ──
          # ubuntu-24.04-arm 是 GH-hosted 的 ARM Linux runner（2024 新增），native build。
          - { name: linux-x64,   os: ubuntu-latest,    eb_args: '--linux --x64',   npm_arch: x64   }
          # linux-arm64 显式列出 target：deb/rpm/pacman 走 fpm，但 fpm 上游没有 arm64 二进制
          # (electron-builder 缓存的 fpm-1.9.3-2.3.1-linux-x86 在 arm64 host 直接 Exec format error)
          # 所以 arm64 只出 AppImage + tar.gz；--linux <targets...> 会按 yml target 各自的 arch 列表过滤
          - { name: linux-arm64, os: ubuntu-24.04-arm, eb_args: '--linux AppImage tar.gz --arm64', npm_arch: arm64 }
    runs-on: ${{ matrix.os }}
    env:
      # electron-builder 在 pnpm monorepo 下需要 hoisted 布局：
      # 默认的符号链接会让原生依赖指向 app 目录之外，触发 "must be under appDir"。
      NPM_CONFIG_NODE_LINKER: hoisted
      # 给 node-gyp / install-app-deps 看：交叉构建（Windows arm64）按这个 arch 拉 prebuilds。
      # native 构建（macos-13/macos-latest/ubuntu-*/ubuntu-24.04-arm）下设了也无害。
      npm_config_arch: ${{ matrix.npm_arch }}
      npm_config_target_arch: ${{ matrix.npm_arch }}
    steps:
      # actions/checkout：截至当前 v4 仍是 GA stable，v5 尚未发布。等 v5 stable 再升。
      - uses: actions/checkout@v4

      # pnpm/action-setup：v4 是当前 stable。等 v5 stable 再升。
      - uses: pnpm/action-setup@v4

      # actions/setup-node：v4 是当前 stable。等 v5 stable 再升。
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-gyp 在 Python ≥3.12 缺 distutils；固定 3.11 以稳定重建原生模块（better-sqlite3 等）
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # rpm / fakeroot：electron-builder 打 .rpm 必备
      # libarchive-tools：提供 bsdtar，fpm 打 .pacman 需要（缺这个会 exit 127）
      - name: Install Linux packaging tools
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot libarchive-tools

      # tag push 时根据 git tag 同步 apps/desktop/package.json 的 version，
      # 让产物文件名（${productName}-${version}-…）跟 tag 对齐。手工/分支触发下 noop。
      # 必须在 Install / Build / Package 之前跑，否则 electron-builder 还会读到旧 version。
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sync-version.mjs

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @db-tool/desktop typecheck

      - name: Build (electron-vite)
        run: pnpm --filter @db-tool/desktop exec electron-vite build

      - name: Rebuild native modules for Electron ABI
        run: pnpm --filter @db-tool/desktop exec electron-builder install-app-deps --arch=${{ matrix.npm_arch }}

      # macOS 签名 & 公证：5 个 APPLE_* secret 齐全时启用，缺任何一个就降级为「不签」（仍出 dmg）。
      # 这样未来配 secret 不用改 workflow，直接生效；OSS 贡献者 PR 跑 fork 也不会因缺 secret 失败。
      #
      # 启用条件：CSC_LINK + CSC_KEY_PASSWORD + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
      #   - CSC_LINK / CSC_KEY_PASSWORD：开发者证书 .p12 base64 + 密码
      #   - APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID：notarytool 上传公证用
      # 这 5 个 secret 的来源 / 申请步骤见 db-tool-private/SIGNING-SETUP.md
      - name: Package installers
        shell: bash
        env:
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXTRA=""
          if [[ "$RUNNER_OS" == "macOS" && -n "$CSC_LINK" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" ]]; then
            echo "::notice::mac signing & notarize enabled (teamId=$APPLE_TEAM_ID)"
            # 覆盖 yml 里 identity: null，让 electron-builder 用 CSC_LINK 拿到的证书签
            # notarize.teamId 设上之后 electron-builder 会自动调 notarytool（需 APPLE_ID/APP_SPECIFIC_PASSWORD env）
            EXTRA="-c.mac.identity= -c.mac.notarize.teamId=$APPLE_TEAM_ID"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "::warning::mac secrets not set, building unsigned dmg (Gatekeeper will warn on install)"
          fi
          pnpm --filter @db-tool/desktop exec electron-builder ${{ matrix.eb_args }} $EXTRA --publish never

      # Windows 走 SignPath.io 后签（OSS 免费）：electron-builder 出未签 .exe，
      # 由 SignPath 收单签名后覆盖回 release/。完整步骤（含申请账号 / 4 个 secret 配置）见
      # db-tool-private/SIGNING-SETUP.md「Windows 段」。
      # 申请通过后取消下方注释，3 个 step 替换占位：
      #
      # - name: Upload unsigned Windows installers (for SignPath)
      #   if: runner.os == 'Windows'
      #   id: upload-unsigned-win
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: unsigned-${{ matrix.name }}
      #     path: apps/desktop/release/*.exe
      #     if-no-files-found: error
      #
      # - name: Submit Windows installers to SignPath
      #   if: runner.os == 'Windows'
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      #     signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
      #     artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_SLUG }}
      #     github-artifact-id: ${{ steps.upload-unsigned-win.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: apps/desktop/release

      # 手动/分支触发：产物存为 Actions artifact，可在 run 页面下载（按 matrix.name 分开）
      # actions/upload-artifact：v4 是当前 stable。等 v5 stable 再升。
      - uses: actions/upload-artifact@v4
        with:
          name: skylerx-${{ matrix.name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.pacman
            apps/desktop/release/*.tar.gz
            apps/desktop/release/*.zip
            apps/desktop/release/*.yml
          if-no-files-found: ignore

      # tag v* 触发：把安装包挂到对应 GitHub Release（所有 matrix 各自追加，不冲突）
      # softprops/action-gh-release：v2 是当前 stable。
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.pacman
            apps/desktop/release/*.tar.gz
            apps/desktop/release/*.zip
            apps/desktop/release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# 备注：
# - loong64（龙芯）需要换 electron-loongarch64 fork + 交叉编译 better-sqlite3 等原生模块，
#   electron-builder 也不原生支持 loong64 包格式，需要 patch 或换 FPM。单独立 PR 做。
# - sw_64（申威）没有公开的 Electron 分支，做不了。
# - HarmonyOS NEXT 是不同框架（ArkTS + 自研内核），不是 Electron 平台。
