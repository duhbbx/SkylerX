name: build-desktop

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS：只构建 Apple Silicon (M 系) 版本 ──
          # 用户决定不再为 Intel Mac 出包 (M1 起已 5 年,Intel Mac 用户极少;同时省 ~6 min CI 时间)
          # 老 Intel Mac 用户可走 Rosetta 跑 arm64 dmg(性能/体积有损但能用),或自行编译
          - { name: mac-arm64,  os: macos-latest,     eb_args: '--mac --arm64',  npm_arch: arm64  }

          # ── Windows：x64 native；arm64 在 x64 runner 上交叉打包 ──
          # GH-hosted 暂无 Windows ARM runner，arm64 native modules 走 prebuild。
          - { name: win-x64,    os: windows-latest,   eb_args: '--win --x64',    npm_arch: x64    }
          - { name: win-arm64,  os: windows-latest,   eb_args: '--win --arm64',  npm_arch: arm64  }

          # ── Linux：x64 + arm64 双架构 ──
          # ubuntu-24.04-arm 是 GH-hosted 的 ARM Linux runner（2024 新增），native build。
          - { name: linux-x64,   os: ubuntu-latest,    eb_args: '--linux --x64',   npm_arch: x64   }
          # linux-arm64 显式列出 target：deb/rpm/pacman 走 fpm，但 fpm 上游没有 arm64 二进制
          # (electron-builder 缓存的 fpm-1.9.3-2.3.1-linux-x86 在 arm64 host 直接 Exec format error)
          # 所以 arm64 只出 AppImage + tar.gz；--linux <targets...> 会按 yml target 各自的 arch 列表过滤
          - { name: linux-arm64, os: ubuntu-24.04-arm, eb_args: '--linux AppImage tar.gz --arm64', npm_arch: arm64 }
    runs-on: ${{ matrix.os }}
    env:
      # electron-builder 在 pnpm monorepo 下需要 hoisted 布局：
      # 默认的符号链接会让原生依赖指向 app 目录之外，触发 "must be under appDir"。
      NPM_CONFIG_NODE_LINKER: hoisted
      # 给 node-gyp / install-app-deps 看：交叉构建（Windows arm64）按这个 arch 拉 prebuilds。
      # native 构建（macos-13/macos-latest/ubuntu-*/ubuntu-24.04-arm）下设了也无害。
      npm_config_arch: ${{ matrix.npm_arch }}
      npm_config_target_arch: ${{ matrix.npm_arch }}
    steps:
      # actions/checkout：截至当前 v4 仍是 GA stable，v5 尚未发布。等 v5 stable 再升。
      - uses: actions/checkout@v4

      # pnpm/action-setup：v4 是当前 stable。等 v5 stable 再升。
      - uses: pnpm/action-setup@v4

      # actions/setup-node：v4 是当前 stable。等 v5 stable 再升。
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-gyp 在 Python ≥3.12 缺 distutils；固定 3.11 以稳定重建原生模块（better-sqlite3 等）
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # rpm / fakeroot：electron-builder 打 .rpm 必备
      # libarchive-tools：提供 bsdtar，fpm 打 .pacman 需要（缺这个会 exit 127）
      - name: Install Linux packaging tools
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot libarchive-tools

      # tag push 时根据 git tag 同步 apps/desktop/package.json 的 version，
      # 让产物文件名（${productName}-${version}-…）跟 tag 对齐。手工/分支触发下 noop。
      # 必须在 Install / Build / Package 之前跑，否则 electron-builder 还会读到旧 version。
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sync-version.mjs

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @db-tool/desktop typecheck

      - name: Build (electron-vite)
        run: pnpm --filter @db-tool/desktop exec electron-vite build

      - name: Rebuild native modules for Electron ABI
        run: pnpm --filter @db-tool/desktop exec electron-builder install-app-deps --arch=${{ matrix.npm_arch }}

      # macOS 签名 & 公证：5 个 APPLE_* secret 齐全时启用，缺任何一个就降级为「不签」（仍出 dmg）。
      # 这样未来配 secret 不用改 workflow，直接生效；OSS 贡献者 PR 跑 fork 也不会因缺 secret 失败。
      #
      # 启用条件：CSC_LINK + CSC_KEY_PASSWORD + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
      #   - CSC_LINK / CSC_KEY_PASSWORD：开发者证书 .p12 base64 + 密码
      #   - APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID：notarytool 上传公证用
      # 这 5 个 secret 的来源 / 申请步骤见 db-tool-private/SIGNING-SETUP.md
      - name: Package installers
        shell: bash
        env:
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXTRA=""
          if [[ "$RUNNER_OS" == "macOS" && -n "$CSC_LINK" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" ]]; then
            echo "::notice::mac signing & notarize enabled (teamId=$APPLE_TEAM_ID)"
            # 覆盖 yml 里 identity: null，让 electron-builder 用 CSC_LINK 拿到的证书签
            # notarize.teamId 设上之后 electron-builder 会自动调 notarytool（需 APPLE_ID/APP_SPECIFIC_PASSWORD env）
            EXTRA="-c.mac.identity= -c.mac.notarize.teamId=$APPLE_TEAM_ID"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "::warning::mac secrets not set, building unsigned dmg (Gatekeeper will warn on install)"
          fi
          pnpm --filter @db-tool/desktop exec electron-builder ${{ matrix.eb_args }} $EXTRA --publish never

      # Windows 走 SignPath.io 后签（OSS 免费）：electron-builder 出未签 .exe，
      # 由 SignPath 收单签名后覆盖回 release/。完整步骤（含申请账号 / 4 个 secret 配置）见
      # db-tool-private/SIGNING-SETUP.md「Windows 段」。
      # 申请通过后取消下方注释，3 个 step 替换占位：
      #
      # - name: Upload unsigned Windows installers (for SignPath)
      #   if: runner.os == 'Windows'
      #   id: upload-unsigned-win
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: unsigned-${{ matrix.name }}
      #     path: apps/desktop/release/*.exe
      #     if-no-files-found: error
      #
      # - name: Submit Windows installers to SignPath
      #   if: runner.os == 'Windows'
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      #     signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
      #     artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_SLUG }}
      #     github-artifact-id: ${{ steps.upload-unsigned-win.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: apps/desktop/release

      # 手动/分支触发：产物存为 Actions artifact，可在 run 页面下载（按 matrix.name 分开）
      # actions/upload-artifact：v4 是当前 stable。等 v5 stable 再升。
      - uses: actions/upload-artifact@v4
        with:
          name: skylerx-${{ matrix.name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.pacman
            apps/desktop/release/*.tar.gz
            apps/desktop/release/*.zip
            apps/desktop/release/*.yml
          if-no-files-found: ignore

      # Prerelease channel yml(build job 里也生成一份给 GitHub Release attach 用)
      # 详细说明见 release-mirror-oss job 里同名 step
      - name: Duplicate latest*.yml as rc/beta/alpha channels (for GH Release)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          for src in apps/desktop/release/latest*.yml; do
            [ -f "$src" ] || continue
            base=$(basename "$src" | sed 's/^latest/CH/')
            for ch in rc beta alpha; do
              dst="apps/desktop/release/$(echo "$base" | sed "s/^CH/$ch/")"
              cp "$src" "$dst"
            done
          done
          ls apps/desktop/release/*.yml | sort

      # tag v* 触发：把安装包挂到对应 GitHub Release（所有 matrix 各自追加，不冲突）
      # softprops/action-gh-release：v2 是当前 stable。
      # 同时 attach rc/beta/alpha yml 避免 electron-updater prerelease channel 推断坑
      #
      # generate_release_notes: true → GitHub 自动从上次 tag 到现在的 commits + PR
      # 生成 release notes (Markdown body),app 端 electron-updater 拉这个作为 releaseNotes
      # 显示在 about 弹框,让用户看到这次更新做了啥再决定是否安装.
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.pacman
            apps/desktop/release/*.tar.gz
            apps/desktop/release/*.zip
            apps/desktop/release/latest*.yml
            apps/desktop/release/rc*.yml
            apps/desktop/release/beta*.yml
            apps/desktop/release/alpha*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────
  # OSS 镜像上传 (国内分发加速 + electron-updater 国内 channel)
  #
  # 当前配置 bucket: skylerx-build (华东 2 上海)
  # 触发: 仅 tag v* (跟 GitHub Release 一致)
  #
  # 目录结构:
  #   oss://skylerx-build/releases/v0.5.0/        永久存档
  #     ├── SkylerX-0.5.0-*-setup.exe             安装包
  #     ├── SkylerX-0.5.0-*-portable.exe          Windows 绿色版 (免安装)
  #     ├── SkylerX-0.5.0-*.dmg / .AppImage / .deb / .rpm / ...
  #     └── latest*.yml                           electron-updater 国内通道清单
  #   oss://skylerx-build/releases/latest/        最新版镜像 (固定 URL)
  #     └── 同上,每次发布覆盖
  #
  # 公开 URL 形如:
  #   https://skylerx-build.oss-cn-shanghai.aliyuncs.com/releases/v0.5.0/SkylerX-0.5.0-arm64-setup.exe
  #   https://skylerx-build.oss-cn-shanghai.aliyuncs.com/releases/latest/SkylerX-0.5.0-arm64.dmg
  #
  # app 端切到国内更新源:
  #   autoUpdater.setFeedURL({
  #     provider: 'generic',
  #     url: 'https://skylerx-build.oss-cn-shanghai.aliyuncs.com/releases/latest/'
  #   })
  # 会去读上面 latest.yml / latest-mac.yml / latest-linux.yml
  #
  # GitHub Secrets (用户通过 gh CLI 配置 — 见 README):
  #   - OSS_BUCKET            ("skylerx-build")
  #   - OSS_ENDPOINT          ("oss-cn-shanghai.aliyuncs.com")
  #   - OSS_ACCESS_KEY_ID     (RAM 子账号 AK)
  #   - OSS_ACCESS_KEY_SECRET (RAM 子账号 SK)
  #
  # 若 secrets 未配置,该 job 会优雅跳过,不会失败构建。
  # ──────────────────────────────────────────────────────────────────────
  release-mirror-oss:
    name: Mirror to Aliyun OSS
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && github.repository == 'duhbbx/SkylerX'
    runs-on: ubuntu-latest
    # secrets 不能在 step.if 直接引用,先吊到 env 再判 env.OSS_BUCKET
    env:
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Warn if OSS secrets missing
        if: env.OSS_BUCKET == '' || env.OSS_ACCESS_KEY_ID == ''
        run: |
          echo "::warning::OSS_BUCKET / OSS_ACCESS_KEY_ID 未配置, 跳过 OSS 镜像上传"
          echo "首次启用执行 gh CLI 配置: 见 README 或 .github/workflows/build-desktop.yml 注释"

      # 下载每个 matrix 到独立子目录 — 不能用 merge-multiple,
      # 因为 win-x64 和 win-arm64 都各自生成 latest.yml,合并会互相覆盖,
      # 导致最终 yml 里 sha 和实际 exe 不匹配 (用户报告 'sha512 checksum mismatch')
      - name: Download all artifacts (per-matrix subdirs)
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: skylerx-*
          # 不用 merge-multiple,各 matrix 留在 artifacts/skylerx-<name>/

      # 把每个 matrix 子目录里的产物文件搬到 dist/, yml 单独处理避免冲突
      - name: Flatten artifacts (合并所有 platform yml 文件列表)
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        run: |
          mkdir -p dist
          # 1. 所有非 yml 产物文件直接拷过来 (各 matrix 产物文件名都带 arch 不冲突)
          find artifacts/ -type f ! -name '*.yml' -exec cp -v {} dist/ \;

          # 2. yml 文件按平台合并:
          #    - latest.yml:        合并所有 win-* 的产物
          #    - latest-mac.yml:    合并所有 mac-* 的产物 (当前只有 mac-arm64)
          #    - latest-linux.yml:  合并所有 linux-x64 的产物
          #    - latest-linux-arm64.yml: linux-arm64 的产物
          #
          # 用 node + js-yaml(electron-vite 间接依赖,monorepo 里已存在)合并 yml
          # 每个 yml file 的 files 数组来自多个 matrix 真实 sha 累加,确保不再 mismatch
          # 装一份独立的 js-yaml,避免对 monorepo 解析路径的依赖
          npm install --no-save --silent js-yaml@4 2>&1 | tail -3 || true
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const yaml = require('js-yaml');
          // 收集每个 platform 的所有 yml 并合并 files 数组
          const targets = {
            'latest.yml': [],
            'latest-mac.yml': [],
            'latest-linux.yml': [],
            'latest-linux-arm64.yml': [],
          };
          const matrices = fs.readdirSync('artifacts');
          for (const m of matrices) {
            const dir = path.join('artifacts', m);
            if (!fs.statSync(dir).isDirectory()) continue;
            for (const f of fs.readdirSync(dir)) {
              if (targets[f]) targets[f].push(path.join(dir, f));
            }
          }

          for (const [name, paths] of Object.entries(targets)) {
            if (!paths.length) continue;
            const merged = { files: [] };
            const seen = new Set();
            for (const p of paths) {
              const y = yaml.load(fs.readFileSync(p, 'utf8'));
              // 顶层字段:除 files 外其他 (version/path/sha512/releaseDate) 用第一个 yml 的
              for (const k of Object.keys(y)) {
                if (k === 'files') continue;
                if (merged[k] === undefined) merged[k] = y[k];
              }
              for (const f of (y.files || [])) {
                if (!seen.has(f.url)) {
                  seen.add(f.url);
                  merged.files.push(f);
                }
              }
            }
            const out = path.join('dist', name);
            fs.writeFileSync(out, yaml.dump(merged, { lineWidth: -1, quotingType: "'" }));
            console.log(`wrote ${name}: ${merged.files.length} files (from ${paths.length} matrices)`);
          }
          EOF

          echo "--- dist/ 清单 ---"
          ls -la dist/
          echo ""
          echo "--- dist/latest.yml ---"
          cat dist/latest.yml

      # 生成 index.json — 文档站国内下载页 (DownloadMatrix) 读这个,
      # 替代 GitHub releases API (国内访问慢/被限流)。
      # 字段跟 GH API 形状近似(name/size/url),DownloadMatrix 双源切换无差异处理。
      - name: Generate OSS index.json
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const tag = process.env.GITHUB_REF_NAME;
            const base = 'https://${{ env.OSS_BUCKET }}.${{ env.OSS_ENDPOINT }}/releases/' + tag;
            const dist = 'dist';
            const assets = fs.readdirSync(dist)
              .filter(f => !/\.blockmap$/.test(f) && !/index\.json$/.test(f) && fs.statSync(path.join(dist, f)).isFile())
              .map(f => {
                const stat = fs.statSync(path.join(dist, f));
                return { name: f, size: stat.size, url: base + '/' + f };
              });
            const idx = {
              tag_name: tag,
              published_at: new Date().toISOString(),
              source: 'oss-cn-shanghai',
              assets,
            };
            fs.writeFileSync(path.join(dist, 'index.json'), JSON.stringify(idx, null, 2));
            console.log('generated index.json with', assets.length, 'assets');
          "
          cat dist/index.json | head -30

      # manyuanrong/setup-ossutil: 3.0 是当前 stable, 装 ossutil 1.7+
      - name: Setup ossutil
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ env.OSS_ENDPOINT }}
          access-key-id: ${{ env.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.OSS_ACCESS_KEY_SECRET }}

      # Prerelease channel yml — electron-updater 看到 app version 含 -rc.1 / -beta.2 / -alpha.3
      # 后缀时,默认 channel 推断成 rc / beta / alpha,会去拉 rc.yml / beta.yml / alpha.yml,
      # 而不是 latest.yml。我们的 build 只生成 latest*.yml,所以 prerelease 装机的用户
      # 自动更新 check 时拿不到 yml,退化为"已是最新"。
      # 修法:把 latest*.yml 复制一份命名为 rc*.yml / beta*.yml / alpha*.yml,
      # 这样所有 prerelease channel 推断都能命中。stable release 仍走 latest.yml 不变。
      - name: Duplicate latest*.yml as rc/beta/alpha channels
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        run: |
          for src in dist/latest*.yml; do
            [ -f "$src" ] || continue
            base=$(basename "$src" | sed 's/^latest/CH/')
            for ch in rc beta alpha; do
              dst="dist/$(echo "$base" | sed "s/^CH/$ch/")"
              cp "$src" "$dst"
              echo "  $src → $(basename "$dst")"
            done
          done
          ls dist/*.yml | sort

      # 上传到 releases/<tag>/ + releases/latest/ 双路径
      # 排除项:
      #   *.blockmap  — electron-updater 的增量差分文件,自动更新场景才需要,
      #                 网页直接下载无意义,排掉省 OSS 流量(单文件 ~10MB,8 个架构 80MB)
      # 保留项:
      #   latest*.yml + rc*.yml + beta*.yml + alpha*.yml — electron-updater 必读
      #   所有产物文件(.dmg/.exe/.AppImage/.deb/.rpm/.pacman/.tar.gz)
      - name: Upload to OSS (tagged + latest)
        if: env.OSS_BUCKET != '' && env.OSS_ACCESS_KEY_ID != ''
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "::notice::Uploading to oss://${OSS_BUCKET}/releases/${TAG}/ and /latest/"
          ossutil cp -rf dist/ "oss://${OSS_BUCKET}/releases/${TAG}/" \
            --exclude "*.blockmap"
          # latest/ 镜像: 用户可永远靠 /releases/latest/ 拿当前最新版
          ossutil cp -rf dist/ "oss://${OSS_BUCKET}/releases/latest/" \
            --exclude "*.blockmap"
          echo "::notice::Done. Download base: https://${OSS_BUCKET}.${OSS_ENDPOINT}/releases/${TAG}/"

# 备注：
# - loong64（龙芯）需要换 electron-loongarch64 fork + 交叉编译 better-sqlite3 等原生模块，
#   electron-builder 也不原生支持 loong64 包格式，需要 patch 或换 FPM。单独立 PR 做。
# - sw_64（申威）没有公开的 Electron 分支，做不了。
# - HarmonyOS NEXT 是不同框架（ArkTS + 自研内核），不是 Electron 平台。
