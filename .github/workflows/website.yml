# SkylerX 官网自动部署到 Cloudflare Pages。
#
# 触发:push 到 main 且改动 apps/website / README / INTRO 或 workflow 自身
# 步骤:setup → install → vitepress build → 通过 wrangler 推到 CF Pages
#
# 需要的 Secrets(GitHub Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — 在 CF dashboard 创建,权限至少包含 "Pages Edit"
#   CLOUDFLARE_ACCOUNT_ID — CF dashboard 右下侧栏的 Account ID
#
# Pages 项目名:skylerx-website(可改,见下面的 projectName)
#
# 备用:若不用 CF Pages,把 deploy 步骤换成 Vercel CLI / Netlify CLI / scp 到自己服务器即可

name: deploy-website

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'INTRO.md'
      - '.github/workflows/website.yml'
  workflow_dispatch: # 也可在 GitHub Actions 页面手动触发

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build:website

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/website/.vitepress/dist --project-name=skylerx-website --branch=main
