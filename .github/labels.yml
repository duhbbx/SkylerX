# Repository labels for SkylerX
#
# Sync to GitHub: bash scripts/sync-github-labels.sh
# Render YAML with:
#   gh label list (current) vs this file (desired)
#
# Color reference (high contrast on both light/dark GitHub themes):
#   #b60205 dark red    | #d73a4a red       | #e99695 light red
#   #d93f0b orange      | #fbca04 yellow    | #fef2c0 cream
#   #0e8a16 dark green  | #22c55e green     | #c5f2c4 light green
#   #006b75 teal        | #0075ca blue      | #c0e0ff light blue
#   #5319e7 dark purple | #a855f7 purple    | #d4c5f9 lavender
#   #4b5563 dark grey   | #9ca3af grey      | #d1d5db light grey
#   #bf6b00 brown       | #14b8a6 cyan      | #ec4899 pink

# ── 类型(type:): issue / PR 主分类 ──
- name: "type: bug"
  color: "d73a4a"
  description: "Something isn't working as expected"
- name: "type: feature"
  color: "0e8a16"
  description: "New feature request"
- name: "type: enhancement"
  color: "22c55e"
  description: "Improvement to an existing feature"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type: question"
  color: "a855f7"
  description: "Usage question / clarification"
- name: "type: regression"
  color: "b60205"
  description: "Worked before, broken now"
- name: "type: refactor"
  color: "c0e0ff"
  description: "Internal code change without behavior change"
- name: "type: chore"
  color: "d1d5db"
  description: "Build / CI / dependency / housekeeping"
- name: "type: security"
  color: "b60205"
  description: "Security vulnerability or hardening"
- name: "type: smoke"
  color: "fbca04"
  description: "Pre-release manual regression checklist tracking"

# ── 优先级(priority:) ──
- name: "priority: critical"
  color: "b60205"
  description: "Blocks usage / data loss / security; fix ASAP"
- name: "priority: high"
  color: "d93f0b"
  description: "Major impact, fix in next release"
- name: "priority: medium"
  color: "fbca04"
  description: "Default priority"
- name: "priority: low"
  color: "c0e0ff"
  description: "Nice to have"

# ── 状态(status:) ──
- name: "status: needs-triage"
  color: "fef2c0"
  description: "Awaiting maintainer review"
- name: "status: in-progress"
  color: "0075ca"
  description: "Someone is working on this"
- name: "status: needs-info"
  color: "d93f0b"
  description: "Waiting for more info from reporter"
- name: "status: blocked"
  color: "d73a4a"
  description: "Blocked by external dependency"
- name: "status: duplicate"
  color: "9ca3af"
  description: "Duplicate of another issue"
- name: "status: wontfix"
  color: "4b5563"
  description: "Intentional / out of scope"
- name: "status: stale"
  color: "9ca3af"
  description: "No activity, will close if untouched"

